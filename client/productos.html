<script>
    // El botón "Volver" regresa a la página de origen (ej. Ofertas) en vez de
    // ir siempre a Inicio, cuando se llega aquí desde una categoría de esa página.
    (function () {
        const params = new URLSearchParams(window.location.search);
        const origen = params.get("origen");
        const btnVolver = document.getElementById("btn-volver");
        if (!btnVolver) return;

        if (origen === "ofertas") {
            btnVolver.href = "ofertas.html";
        }
    })();
</script>
